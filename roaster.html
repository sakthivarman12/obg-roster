<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBG Duty Roster</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#d0cfc8;--border-dark:#aaa;
  --text:#1a1a1a;--muted:#888;--header:#1a2540;--header-text:#fff;
  --sunday:#fff8f0;--today:#f0f7ff;
  --reg-bg:#e8f5e9;--reg-text:#2e7d32;--reg-b:#a5d6a7;
  --full-bg:#e3f2fd;--full-text:#1565c0;--full-b:#90caf9;
  --leave-bg:#fce4ec;--leave-text:#c62828;--leave-b:#f48fb1;
  --font:'Segoe UI','Arial',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem;}

#toast{position:fixed;top:1rem;right:1rem;z-index:9999;max-width:380px;font-size:0.73rem;padding:0.6rem 1rem;border-radius:4px;opacity:0;transition:opacity 0.2s;pointer-events:none;line-height:1.5;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
#toast.show{opacity:1;}
#dblog{background:#fffde7;border:1px solid #f9a825;border-radius:4px;padding:0.6rem 0.9rem;margin-bottom:1rem;font-size:0.72rem;color:#5d4037;display:none;}
#dblog.visible{display:block;}
#dblog pre{white-space:pre-wrap;word-break:break-all;margin-top:4px;font-family:monospace;font-size:0.68rem;}
#loader{position:fixed;inset:0;background:rgba(245,244,240,0.85);display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:var(--muted);z-index:99;}
#loader.hidden{display:none;}

.hospital-header{text-align:center;background:var(--header);color:var(--header-text);padding:0.9rem 1.5rem;margin-bottom:1.25rem;border-radius:4px;}
.hospital-header h1{font-size:1rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.2rem;}
.hospital-header h2{font-size:0.8rem;font-weight:400;letter-spacing:0.06em;text-transform:uppercase;opacity:0.8;margin-bottom:0.15rem;}
.hospital-header h3{font-size:0.75rem;font-weight:600;letter-spacing:0.05em;opacity:0.9;}

.toolbar{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;background:var(--surface);padding:0.65rem 1rem;border:1px solid var(--border);border-radius:4px;}
.month-nav{display:flex;align-items:center;gap:0.6rem;}
.month-nav button{background:none;border:1px solid var(--border-dark);color:var(--text);font-size:0.75rem;padding:0.3rem 0.6rem;cursor:pointer;border-radius:3px;font-family:var(--font);}
.month-nav button:hover{background:#eee;}
.month-nav .month-label{font-size:0.8rem;font-weight:600;min-width:120px;text-align:center;}
.add-doctor{display:flex;margin-left:auto;}
.add-doctor input{border:1px solid var(--border-dark);border-right:none;background:#fff;color:var(--text);font-family:var(--font);font-size:0.75rem;padding:0.35rem 0.65rem;width:150px;outline:none;border-radius:3px 0 0 3px;}
.add-doctor input:focus{border-color:#555;}
.add-doctor button{border:1px solid var(--border-dark);background:var(--header);color:#fff;font-family:var(--font);font-size:0.75rem;padding:0.35rem 0.75rem;cursor:pointer;border-radius:0 3px 3px 0;}
.add-doctor button:hover{background:#243060;}
.export-btn{border:1px solid var(--border-dark);background:none;color:var(--text);font-family:var(--font);font-size:0.72rem;padding:0.35rem 0.75rem;cursor:pointer;border-radius:3px;white-space:nowrap;}
.export-btn:hover{background:#eee;}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4caf50;margin-right:5px;}
.status-dot.offline{background:#f44336;}

.doctor-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0.6rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:1rem;min-height:42px;align-items:center;}
.chip{display:inline-flex;align-items:center;gap:4px;background:#e8eaf6;color:#283593;border:1px solid #c5cae9;border-radius:20px;font-size:0.7rem;padding:0.2rem 0.6rem;}
.chip .rm{cursor:pointer;color:#9fa8da;font-size:0.65rem;margin-left:2px;}
.chip .rm:hover{color:#c62828;}

.grid-wrap{overflow-x:auto;}
table{border-collapse:collapse;width:100%;background:var(--surface);font-size:0.78rem;}
table th,table td{border:1px solid var(--border);padding:0;}
thead th{background:var(--header);color:var(--header-text);font-size:0.7rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;padding:0.5rem 0.6rem;white-space:nowrap;text-align:center;}
thead th.left{text-align:left;}
tbody tr.sunday{background:var(--sunday);}
tbody tr.today-row{background:var(--today);}
td.date-cell{padding:0.4rem 0.6rem;white-space:nowrap;font-size:0.75rem;font-weight:500;text-align:center;min-width:70px;}
td.day-cell{padding:0.4rem 0.6rem;white-space:nowrap;font-size:0.75rem;text-align:left;min-width:80px;}
tr.sunday td.day-cell{font-weight:700;}
td.duty-cell{padding:3px 4px;text-align:center;min-width:220px;}
.duty-wrap{display:flex;gap:4px;align-items:center;justify-content:center;}
select.doc-select{-webkit-appearance:none;appearance:none;border:1px solid var(--border);background:#fff;color:var(--text);font-family:var(--font);font-size:0.72rem;padding:0.28rem 0.5rem;flex:1;min-width:0;cursor:pointer;outline:none;border-radius:3px;max-width:130px;}
select.doc-select:focus{border-color:#666;}
select.shift-select{-webkit-appearance:none;appearance:none;border:1px solid var(--border);background:#fff;font-family:var(--font);font-size:0.68rem;padding:0.28rem 0.3rem;width:80px;cursor:pointer;outline:none;border-radius:3px;text-align:center;font-weight:500;}
select.shift-select option{background:#fff;color:var(--text);}
select.shift-select.s-REG{background:var(--reg-bg);color:var(--reg-text);border-color:var(--reg-b);}
select.shift-select.s-FULL{background:var(--full-bg);color:var(--full-text);border-color:var(--full-b);}
select.shift-select.s-LEAVE{background:var(--leave-bg);color:var(--leave-text);border-color:var(--leave-b);}
td.note-cell{padding:3px 6px;min-width:160px;}
input.note-input{border:none;background:transparent;font-family:var(--font);font-size:0.72rem;color:var(--text);width:100%;outline:none;padding:0.25rem 0.1rem;}
input.note-input::placeholder{color:#bbb;}
input.note-input:focus{background:#fffde7;}
.footer-note{margin-top:0.75rem;font-size:0.7rem;color:var(--muted);font-style:italic;text-align:center;padding:0.4rem;border-top:1px solid var(--border);background:var(--surface);}
.legend{display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;font-size:0.7rem;color:var(--muted);}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-box{width:12px;height:12px;border-radius:2px;border:1px solid;}
@media print{body{padding:0;}.toolbar,.doctor-chips,.legend,#toast,#dblog{display:none!important;}table{font-size:0.7rem;}}
</style>
</head>
<body>

<div id="loader">Connecting to database...</div>
<div id="toast"></div>
<div id="dblog"><strong>⚠ Database Error</strong><pre id="dblogtext"></pre></div>

<div class="hospital-header">
  <h1>ACS Medical College &amp; Hospital</h1>
  <h2>Department of OBG</h2>
  <h3 id="rosterTitle"></h3>
</div>

<div class="doctor-chips" id="doctorChips"></div>

<div class="toolbar">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="add-doctor">
    <input type="text" id="docInput" placeholder="Doctor name" maxlength="30"/>
    <button onclick="addDoctor()">+ Add Doctor</button>
  </div>
  <button class="export-btn" onclick="window.print()">&#128438; Print</button>
  <span style="font-size:0.68rem;color:var(--muted);margin-left:auto;display:flex;align-items:center">
    <span class="status-dot" id="dbDot"></span>
    <span id="dbStatus">Connecting...</span>
  </span>
</div>

<div class="grid-wrap">
  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="footer-note">All Duty Exchange to be informed to HOD</div>

<div class="legend">
  <div class="legend-item"><div class="legend-box" style="background:var(--reg-bg);border-color:var(--reg-b)"></div>Regular</div>
  <div class="legend-item"><div class="legend-box" style="background:var(--full-bg);border-color:var(--full-b)"></div>Full Day</div>
  <div class="legend-item"><div class="legend-box" style="background:var(--leave-bg);border-color:var(--leave-b)"></div>Leave</div>
</div>

<script>
// ── Supabase config ───────────────────────────────────────────
const BASE = 'https://zmjfzhpypaiczaricoxm.supabase.co/rest/v1';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptamZ6aHB5cGFpY3phcmljb3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDU3MTQsImV4cCI6MjA4OTIyMTcxNH0.Q6HtgDA1wm3_FjmUbM_DdBWKIe3zHwvkn-egOu1hXtE';
const HDR  = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function api(method, table, params='', body=null) {
  const opts = { method, headers: { ...HDR } };
  if (body) opts.body = JSON.stringify(body);
  if (method === 'POST') opts.headers['Prefer'] = 'return=representation';
  if (method === 'PATCH' || method === 'PUT') opts.headers['Prefer'] = 'return=representation,resolution=merge-duplicates';
  const res = await fetch(`${BASE}/${table}${params ? '?' + params : ''}`, opts);
  const text = await res.text();
  const data = text ? JSON.parse(text) : null;
  if (!res.ok) throw data || { message: res.statusText, status: res.status };
  return data;
}

// ── Constants ─────────────────────────────────────────────────
const SHIFTS      = ['—','REG','FULL','LEAVE'];
const SHIFT_LABELS= {'—':'—','REG':'Regular','FULL':'Full Day','LEAVE':'Leave'};
const MONTHS      = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let doctors  = [];
let dutiesMap= {};
let notesMap = {};

const now = new Date();
let curYear  = now.getFullYear();
let curMonth = now.getMonth();

// ── UI helpers ────────────────────────────────────────────────
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = err ? '#b71c1c' : '#1a2540';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
function showError(ctx, err) {
  const msg = err?.message || err?.details || err?.error || JSON.stringify(err);
  document.getElementById('dblogtext').textContent = 'Context : ' + ctx + '\nMessage : ' + msg + (err?.code ? '\nCode    : ' + err.code : '') + (err?.hint ? '\nHint    : ' + err.hint : '');
  document.getElementById('dblog').classList.add('visible');
  document.getElementById('dbDot').className = 'status-dot offline';
  document.getElementById('dbStatus').textContent = 'DB Error';
}
function clearError() {
  document.getElementById('dblog').classList.remove('visible');
  document.getElementById('dbDot').className = 'status-dot';
  document.getElementById('dbStatus').textContent = 'Connected';
}
function loader(v) { document.getElementById('loader').classList.toggle('hidden', !v); }

// ── Load ──────────────────────────────────────────────────────
async function loadDoctors() {
  try {
    const data = await api('GET', 'doctors', 'select=name&order=created_at.asc');
    doctors = data.map(d => d.name);
    clearError();
  } catch(e) { showError('Loading doctors', e); }
}

async function loadMonthData() {
  const y = curYear, m = curMonth;
  const from = `${y}-${String(m+1).padStart(2,'0')}-01`;
  const to   = `${y}-${String(m+1).padStart(2,'0')}-${String(new Date(y,m+1,0).getDate()).padStart(2,'0')}`;
  try {
    const [dr, nr] = await Promise.all([
      api('GET','duties',`select=date,slot,doctor_name,shift_type&date=gte.${from}&date=lte.${to}`),
      api('GET','notes', `select=date,note&date=gte.${from}&date=lte.${to}`)
    ]);
    dutiesMap = {};
    dr.forEach(r => { dutiesMap[r.date+'_'+r.slot] = { doctor_name: r.doctor_name||'', shift_type: r.shift_type||'—' }; });
    notesMap = {};
    nr.forEach(r => { notesMap[r.date] = r.note; });
    clearError();
  } catch(e) { showError('Loading month data', e); }
}

// ── Mutations ─────────────────────────────────────────────────
async function addDoctor() {
  const inp = document.getElementById('docInput');
  let name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  if (!name.toLowerCase().startsWith('dr.')) name = 'Dr.' + name;
  if (doctors.includes(name)) { toast('Already exists'); inp.focus(); return; }
  try {
    await api('POST', 'doctors', '', { name });
    doctors.push(name);
    inp.value = '';
    clearError();
    toast(name + ' added ✓');
    renderChips();
    render();
  } catch(e) { showError('Adding doctor: ' + name, e); toast('Failed to add', true); }
  inp.focus();
}

async function removeDoctor(name) {
  if (!confirm('Remove ' + name + '?')) return;
  try {
    await api('DELETE', 'doctors', 'name=eq.' + encodeURIComponent(name));
    doctors = doctors.filter(d => d !== name);
    clearError();
    toast(name + ' removed');
    renderChips();
    render();
  } catch(e) { showError('Removing doctor', e); toast('Remove failed', true); }
}

async function saveDuty(date, slot, doctor_name, shift_type) {
  try {
    if (!doctor_name && (!shift_type || shift_type === '—')) {
      await api('DELETE','duties',`date=eq.${date}&slot=eq.${slot}`);
    } else {
      // Try update first, then insert
      const existing = await api('GET','duties',`date=eq.${date}&slot=eq.${slot}&select=id`);
      if (existing && existing.length > 0) {
        await api('PATCH','duties',`date=eq.${date}&slot=eq.${slot}`, { doctor_name: doctor_name||null, shift_type: shift_type||'—' });
      } else {
        await api('POST','duties','', { date, slot, doctor_name: doctor_name||null, shift_type: shift_type||'—' });
      }
    }
  } catch(e) { showError('Saving duty ' + date + ' ' + slot, e); }
}

async function saveNote(date, note) {
  try {
    if (!note) {
      await api('DELETE','notes','date=eq.'+date);
    } else {
      const existing = await api('GET','notes','date=eq.'+date+'&select=id');
      if (existing && existing.length > 0) {
        await api('PATCH','notes','date=eq.'+date, { note });
      } else {
        await api('POST','notes','', { date, note });
      }
    }
  } catch(e) { showError('Saving note ' + date, e); }
}

// ── Handlers ──────────────────────────────────────────────────
function handleDocChange(sel, date, slot) {
  const key = date+'_'+slot;
  if (!dutiesMap[key]) dutiesMap[key] = { doctor_name:'', shift_type:'—' };
  dutiesMap[key].doctor_name = sel.value;
  saveDuty(date, slot, sel.value, dutiesMap[key].shift_type);
}

function handleShiftChange(sel, date, slot) {
  const val = sel.value;
  sel.className = 'shift-select' + (val==='—' ? '' : ' s-'+val);
  const key = date+'_'+slot;
  if (!dutiesMap[key]) dutiesMap[key] = { doctor_name:'', shift_type:'—' };
  dutiesMap[key].shift_type = val;
  saveDuty(date, slot, dutiesMap[key].doctor_name, val);
}

let noteTimers = {};
function handleNoteChange(inp, date) {
  notesMap[date] = inp.value;
  clearTimeout(noteTimers[date]);
  noteTimers[date] = setTimeout(() => saveNote(date, inp.value), 800);
}

// ── Render ────────────────────────────────────────────────────
function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  loader(true);
  loadMonthData().then(() => { loader(false); render(); });
}

function renderChips() {
  const el = document.getElementById('doctorChips');
  el.innerHTML = doctors.length
    ? doctors.map(d => `<div class="chip">${d}<span class="rm" onclick="removeDoctor('${esc(d)}')">✕</span></div>`).join('')
    : '<span style="font-size:0.7rem;color:#aaa">No doctors — add one above</span>';
}

function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function render() {
  const y = curYear, m = curMonth;
  const days = new Date(y, m+1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);

  document.getElementById('rosterTitle').textContent = MONTHS[m]+' - '+y+' (Duty Roster)';
  document.getElementById('monthLabel').textContent  = MONTHS[m]+' '+y;

  document.getElementById('tableHead').innerHTML =
    `<tr>
      <th class="left" style="min-width:75px">Date</th>
      <th class="left" style="min-width:80px">Day</th>
      <th style="min-width:240px">Slot 1</th>
      <th style="min-width:240px">Slot 2</th>
      <th style="min-width:160px">Notes</th>
    </tr>`;

  const docBase = '<option value="">— Doctor —</option>' +
    doctors.map(d => `<option value="${d}">${d}</option>`).join('');
  const mkDoc   = v => v ? docBase.replace(`value="${v}"`,`value="${v}" selected`) : docBase;
  const mkShift = v => SHIFTS.map(s => `<option value="${s}"${s===v?' selected':''}>${SHIFT_LABELS[s]}</option>`).join('');
  const sCls    = v => v && v!=='—' ? ' s-'+v : '';

  let html = '';
  for (let day = 1; day <= days; day++) {
    const dt  = new Date(y, m, day);
    const dow = dt.getDay();
    const ds  = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const cls = ds===todayStr ? 'today-row' : dow===0 ? 'sunday' : '';
    const d1  = dutiesMap[ds+'_s1'] || { doctor_name:'', shift_type:'—' };
    const d2  = dutiesMap[ds+'_s2'] || { doctor_name:'', shift_type:'—' };
    const nt  = (notesMap[ds]||'').replace(/"/g,'&quot;');

    html += `<tr class="${cls}">
      <td class="date-cell">${String(day).padStart(2,'0')}.${String(m+1).padStart(2,'0')}.${String(y).slice(2)}</td>
      <td class="day-cell">${DAYS_SHORT[dow]}</td>
      <td class="duty-cell"><div class="duty-wrap">
        <select class="doc-select" onchange="handleDocChange(this,'${ds}','s1')">${mkDoc(d1.doctor_name)}</select>
        <select class="shift-select${sCls(d1.shift_type)}" onchange="handleShiftChange(this,'${ds}','s1')">${mkShift(d1.shift_type)}</select>
      </div></td>
      <td class="duty-cell"><div class="duty-wrap">
        <select class="doc-select" onchange="handleDocChange(this,'${ds}','s2')">${mkDoc(d2.doctor_name)}</select>
        <select class="shift-select${sCls(d2.shift_type)}" onchange="handleShiftChange(this,'${ds}','s2')">${mkShift(d2.shift_type)}</select>
      </div></td>
      <td class="note-cell"><input class="note-input" type="text" placeholder="camp / remarks…" value="${nt}" onchange="handleNoteChange(this,'${ds}')"/></td>
    </tr>`;
  }
  document.getElementById('tableBody').innerHTML = html;
}

document.getElementById('docInput').addEventListener('keydown', e => { if(e.key==='Enter') addDoctor(); });

(async () => {
  loader(true);
  await Promise.all([loadDoctors(), loadMonthData()]);
  loader(false);
  renderChips();
  render();
})();
</script>
</body>
</html>
